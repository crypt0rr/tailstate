services:
  tailstate:
    build: .
    image: ${TAILSTATE_IMAGE:-ghcr.io/crypt0rr/tailstate:latest}
    restart: unless-stopped
    read_only: true
    environment:
      TAILSTATE_LISTEN_ADDR: 0.0.0.0:8080
      TAILSTATE_DATA_DIR: /data
      TAILSTATE_MASTER_KEY_FILE: /run/secrets/tailstate_master_key
      TAILSTATE_COOKIE_SECURE: ${TAILSTATE_COOKIE_SECURE:-false}
      TAILSTATE_LOG_LEVEL: ${TAILSTATE_LOG_LEVEL:-info}
    ports:
      - "${TAILSTATE_BIND_ADDRESS:-127.0.0.1}:${TAILSTATE_PORT:-8080}:8080"
    volumes:
      - tailstate-data:/data
    secrets:
      - tailstate_master_key
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/tailstate", "healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  tailstate-data:

secrets:
  tailstate_master_key:
    file: ${TAILSTATE_MASTER_KEY_FILE:-./secrets/tailstate_master_key}
