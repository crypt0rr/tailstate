<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Claim TailState</title><link rel="stylesheet" href="/static/style.css"></head><body><main class="narrow"><section class="card"><h1>Claim TailState</h1><p>Enter the one-time setup token shown in the container logs, then create the administrator password.</p>{{if .Error}}<div class="error">{{.Error}}</div>{{end}}<form method="post" action="/setup/claim"><label>Setup token<input name="token" autocomplete="one-time-code" required></label><label>Administrator password<input type="password" name="password" minlength="12" autocomplete="new-password" required></label><label>Confirm password<input type="password" name="confirm" minlength="12" autocomplete="new-password" required></label><button type="submit">Claim installation</button></form></section></main></body></html>
