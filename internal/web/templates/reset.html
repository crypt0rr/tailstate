<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reset TailState password</title><link rel="stylesheet" href="/static/style.css"></head><body><main class="narrow"><section class="card"><h1>Reset administrator password</h1><p>Generate a reset token with <code>tailstate admin reset</code>.</p>{{if .Error}}<div class="error">{{.Error}}</div>{{end}}<form method="post" action="/reset"><label>Reset token<input name="token" required></label><label>New password<input type="password" name="password" minlength="12" required></label><label>Confirm password<input type="password" name="confirm" minlength="12" required></label><button type="submit">Reset password</button></form><a href="/login">Back to login</a></section></main></body></html>
