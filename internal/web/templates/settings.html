<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TailState settings</title><link rel="stylesheet" href="/static/style.css"></head><body><header><strong>TailState</strong><nav><a href="/status">Status</a><a class="active" href="/settings">Settings</a><form method="post" action="/logout"><input type="hidden" name="_csrf" value="{{.CSRF}}"><button class="link" type="submit">Log out</button></form></nav></header><main><section class="card"><h1>Monitoring settings</h1><p>Saving validates Tailscale access and sends an explicit Mattermost test message. Existing secret fields may be left blank.</p>{{if .Message}}<div class="success">{{.Message}}</div>{{end}}{{if .Error}}<div class="error">{{.Error}}</div>{{end}}<form method="post" action="/settings"><input type="hidden" name="_csrf" value="{{.CSRF}}"><div class="grid"><label>Tailnet<input name="tailnet" value="{{.Settings.Tailnet}}" placeholder="-" required><small>Use <code>-</code> for the OAuth credential's tailnet.</small></label><label>OAuth client ID<input name="client_id" value="{{.Settings.OAuthClientID}}" required></label><label>OAuth client secret<input type="password" name="client_secret" {{if not .Configured}}required{{end}} placeholder="{{if .Configured}}Leave blank to keep current secret{{end}}" autocomplete="new-password"></label><label>Mattermost webhook URL<input type="password" name="mattermost_url" {{if not .Configured}}required{{end}} placeholder="{{if .Configured}}Leave blank to keep current URL{{end}}"></label><label>Device poll interval (seconds)<input type="number" min="15" name="device_interval" value="{{.DeviceSeconds}}" required></label><label>Inventory poll interval (seconds)<input type="number" min="30" name="inventory_interval" value="{{.InventorySeconds}}" required></label></div><button type="submit">Test and save</button></form></section></main></body></html>
